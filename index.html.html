<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JD Company ERP · 제이디컴퍼니</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2a2f45;
  --accent:#00d4a1;--accent2:#00b8e6;--text:#e8eaf2;--muted:#6b7280;
  --red:#f87171;--yellow:#fbbf24;--green:#34d399;--blue:#60a5fa;
  --radius:10px;--radius-sm:6px
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;font-size:13px}

/* ── 잠금 화면 ── */
.lock-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.lock-screen.hidden{display:none}
.lock-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 36px;width:360px;text-align:center}
.lock-logo{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px}
.lock-logo span{color:var(--accent)}
.lock-sub{font-size:12px;color:var(--muted);margin-bottom:32px}
.lock-icon{font-size:48px;color:var(--accent);margin-bottom:24px;opacity:.8}
.lock-label{font-size:11px;color:var(--muted);text-align:left;margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase}
.lock-input{width:100%;height:44px;padding:0 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s;text-align:center;letter-spacing:4px}
.lock-input:focus{border-color:var(--accent)}
.lock-btn{width:100%;height:44px;margin-top:16px;background:var(--accent);color:#0a1a15;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.lock-btn:hover{background:#00ebb2}
.lock-err{color:var(--red);font-size:12px;margin-top:10px;min-height:18px}

/* ── HEADER ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo-name{font-size:15px;font-weight:600;color:var(--text)}
.logo-name span{color:var(--accent)}
.logo-sub{font-size:11px;color:var(--muted);margin-top:2px}
.nav{display:flex;gap:4px;align-items:center}
.nav-btn{padding:7px 16px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.nav-btn.active{background:rgba(0,212,161,0.12);color:var(--accent)}
.nav-btn:hover:not(.active){background:var(--surface2);color:var(--text)}
.lock-nav-btn{padding:7px 12px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:5px;margin-left:8px}
.lock-nav-btn:hover{background:var(--surface2);color:var(--text)}

.content{padding:20px 24px;max-width:1600px;margin:0 auto}

/* ── 월 네비게이터 ── */
.month-nav{display:flex;align-items:center;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;justify-content:space-between;flex-wrap:wrap;gap:10px}
.month-nav-left{display:flex;align-items:center;gap:8px}
.month-arrow{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:14px}
.month-arrow:hover{background:#2e3350;border-color:#3a4060}
.month-current{font-size:18px;font-weight:700;color:var(--accent);min-width:110px;text-align:center}
.month-tabs{display:flex;gap:4px;flex-wrap:wrap}
.month-tab{padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;font-family:inherit;white-space:nowrap}
.month-tab.active{background:rgba(0,212,161,0.12);color:var(--accent);border-color:rgba(0,212,161,0.3)}
.month-tab:hover:not(.active){background:var(--surface2);color:var(--text)}
.month-all-btn{padding:5px 14px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;font-family:inherit}
.month-all-btn.active{background:rgba(255,255,255,0.1);color:var(--text);border-color:#3a4060}
.month-all-btn:hover:not(.active){background:var(--surface2);color:var(--text)}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;transition:border-color .15s}
.kpi:hover{border-color:#3a4060}
.kpi-label{font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:.3px;text-transform:uppercase}
.kpi-val{font-size:22px;font-weight:600;color:var(--accent);line-height:1}
.kpi-val.blue{color:var(--accent2)}
.kpi-val.white{color:var(--text)}
.kpi-val.yellow{color:var(--yellow)}

/* ── 지역 현황판 ── */
.region-board{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;margin-bottom:16px}
.region-board-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.region-board-title{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.region-period{font-size:11px;color:var(--accent);background:rgba(0,212,161,0.1);padding:3px 10px;border-radius:20px;border:1px solid rgba(0,212,161,0.2)}
.region-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
.region-cell{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;transition:all .15s;cursor:pointer}
.region-cell:hover{border-color:rgba(0,212,161,0.4);background:#1e2235}
.region-cell.active-filter{border-color:var(--accent);background:rgba(0,212,161,0.08)}
.region-cell-name{font-size:10px;color:var(--muted);margin-bottom:6px}
.region-cell-val{font-size:20px;font-weight:700;color:var(--accent);line-height:1}
.region-cell-sub{font-size:10px;color:var(--muted);margin-top:3px}

/* ── TOOLBAR ── */
.toolbar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.search-wrap{flex:1;min-width:200px;position:relative;display:flex;align-items:center}
.search-wrap .si{position:absolute;left:11px;color:var(--muted);font-size:15px;pointer-events:none}
.search-wrap input{width:100%;height:36px;padding:0 12px 0 34px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{border-color:var(--accent)}
.tb-select{height:36px;padding:0 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;font-family:inherit;outline:none;cursor:pointer}
.tb-select:focus{border-color:var(--accent)}
.btn{height:36px;padding:0 16px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn:hover{background:#2e3350;border-color:#3a4060}
.btn.accent{background:var(--accent);color:#0a1a15;border-color:var(--accent);font-weight:600}
.btn.accent:hover{background:#00ebb2}
.btn.blue-btn{background:var(--accent2);color:#061520;border-color:var(--accent2);font-weight:600}
.btn.blue-btn:hover{background:#22d3ff}
.btn.danger{border-color:rgba(248,113,113,0.3);color:var(--red)}
.btn.danger:hover{background:rgba(248,113,113,0.08)}

/* ── TABLE ── */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.table-title-block{display:flex;align-items:center;gap:10px}
.table-title{font-size:14px;font-weight:600;color:var(--text)}
.count-badge{font-size:12px;color:var(--muted);background:var(--surface2);padding:3px 12px;border-radius:20px;border:1px solid var(--border)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#141720;color:var(--muted);padding:9px 12px;text-align:left;font-weight:500;font-size:11px;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
thead th:hover{color:var(--text)}
thead th.no-sort{cursor:default}
thead th.no-sort:hover{color:var(--muted)}
tbody tr{border-bottom:1px solid rgba(42,47,69,0.5);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,0.025)}
tbody td{padding:9px 12px;white-space:nowrap}
.tfoot-row{padding:11px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.total-amt{color:var(--accent);font-size:14px;font-weight:600}

.inline-sel{height:28px;padding:0 8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:11px;font-family:inherit;outline:none;cursor:pointer;transition:border-color .15s}
.inline-sel:focus{border-color:var(--accent)}

/* 세금계산서/현금영수증 토글 버튼 */
.tax-toggle{height:26px;padding:0 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .15s;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.tax-toggle.on-tax{background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.4);color:var(--yellow)}
.tax-toggle.on-receipt{background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.4);color:var(--blue)}
.tax-toggle:hover{opacity:.8}

.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.b-teal{background:rgba(0,212,161,0.12);color:var(--accent)}
.b-blue{background:rgba(96,165,250,0.12);color:var(--blue)}
.b-amber{background:rgba(251,191,36,0.12);color:var(--yellow)}
.b-red{background:rgba(248,113,113,0.12);color:var(--red)}
.b-green{background:rgba(52,211,153,0.12);color:var(--green)}
.b-gray{background:rgba(107,114,128,0.12);color:var(--muted)}
.b-purple{background:rgba(167,139,250,0.12);color:#a78bfa}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:600px;max-width:95vw;max-height:92vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:15px;font-weight:600;color:var(--text)}
.close-x{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px 8px;border-radius:4px}
.close-x:hover{background:var(--surface2);color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.3px;text-transform:uppercase}
.fg input,.fg select,.fg textarea{height:38px;padding:0 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg input::placeholder{color:var(--muted)}
.fg textarea{height:68px;padding:10px 12px;resize:none}
/* 체크박스 그룹 */
.check-group{display:flex;gap:16px;align-items:center;height:38px}
.check-item{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--text)}
.check-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.form-divider{grid-column:1/-1;border:none;border-top:1px solid var(--border);margin:4px 0}
.form-section-label{grid-column:1/-1;font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.4px;text-transform:uppercase;padding-bottom:2px}
.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

.section{display:none}.section.active{display:block}

/* ── 월별 통계 ── */
.monthly-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.monthly-summary-header{padding:12px 20px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text)}
.ms-table{width:100%;border-collapse:collapse;font-size:12px}
.ms-table th{background:#141720;color:var(--muted);padding:9px 14px;text-align:left;font-size:11px;letter-spacing:.3px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.ms-table td{padding:10px 14px;border-bottom:1px solid rgba(42,47,69,0.5);color:var(--text)}
.ms-table tr:last-child td{border-bottom:none}
.ms-table tr:hover td{background:rgba(255,255,255,0.02)}
.ms-total{font-weight:700;color:var(--accent)}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat-card h3{font-size:11px;color:var(--muted);margin-bottom:14px;font-weight:500;letter-spacing:.4px;text-transform:uppercase}
.stat-row-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(42,47,69,0.5);font-size:12px;color:var(--text)}
.stat-row-item:last-child{border-bottom:none}
.stat-row-item .sv{color:var(--accent);font-weight:600}

.settings-wrap{max-width:500px;display:flex;flex-direction:column;gap:14px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.sc-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px}
.add-row{display:flex;gap:8px}
.add-row input{flex:1;height:36px;padding:0 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;font-family:inherit;outline:none}
.add-row input:focus{border-color:var(--accent)}
.add-row input::placeholder{color:var(--muted)}
.empty-state{text-align:center;padding:60px;color:var(--muted);font-size:13px}
.sort-ind{font-size:10px;margin-left:3px;color:var(--accent)}
/* 긴급 경고 배지 */
.urgent-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.4);animation:urgentPulse 1.8s ease-in-out infinite;white-space:nowrap}
.warn-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(251,191,36,0.12);color:var(--yellow);border:1px solid rgba(251,191,36,0.35);white-space:nowrap}
.ok-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(52,211,153,0.1);color:var(--green);border:1px solid rgba(52,211,153,0.3);white-space:nowrap}
.no-dist{color:var(--muted);font-size:11px}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.55}}
tbody tr.row-urgent{background:rgba(248,113,113,0.04)!important}
tbody tr.row-urgent:hover{background:rgba(248,113,113,0.08)!important}

@media(max-width:900px){
  .header{padding:12px 16px;flex-direction:column;gap:10px;align-items:flex-start}
  .content{padding:14px 16px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .region-grid{grid-template-columns:repeat(4,1fr)}
  .stat-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .fg.full{grid-column:1}
  .month-tabs{display:none}
}
</style>
</head>
<body>

<!-- ── 잠금 화면 ── -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-box">
    <div class="lock-logo">JD <span>Company</span> ERP</div>
    <div class="lock-sub">제이디컴퍼니 · 보험 DB 주문 관리 전산</div>
    <div class="lock-icon"><i class="ti ti-lock"></i></div>
    <div class="lock-label">어드민 비밀번호</div>
    <input class="lock-input" type="password" id="lock-input" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="lock-btn" onclick="tryLogin()">로그인</button>
    <div class="lock-err" id="lock-err"></div>
  </div>
</div>

<!-- ── 메인 앱 ── -->
<div id="main-app" style="display:none">
<div class="header">
  <div>
    <div class="logo-name">JD <span>Company</span> ERP</div>
    <div class="logo-sub">제이디컴퍼니 · 보험 DB 주문 관리 전산</div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showSection('orders',this)"><i class="ti ti-list"></i> 주문 관리</button>
    <button class="nav-btn" onclick="showSection('stats',this)"><i class="ti ti-chart-bar"></i> 월별 통계</button>
    <button class="nav-btn" onclick="showSection('settings',this)"><i class="ti ti-settings"></i> 설정</button>
    <button class="lock-nav-btn" onclick="doLogout()" title="잠금"><i class="ti ti-lock"></i></button>
  </div>
</div>

<div class="content">

  <!-- 월 네비게이터 -->
  <div class="month-nav">
    <div class="month-nav-left">
      <button class="month-arrow" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="month-current" id="month-current-label"></span>
      <button class="month-arrow" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
      <button class="month-all-btn" id="btn-all-months" onclick="setAllMonths()">전체 기간</button>
    </div>
    <div class="month-tabs" id="month-tabs"></div>
  </div>

  <!-- KPI -->
  <div id="kpi-row" class="kpi-grid"></div>

  <!-- 지역 현황판 -->
  <div class="region-board">
    <div class="region-board-header">
      <span class="region-board-title"><i class="ti ti-map-pin"></i> 지역별 수량 현황</span>
      <span class="region-period" id="region-period-label"></span>
    </div>
    <div class="region-grid" id="region-grid"></div>
  </div>

  <!-- 주문 관리 -->
  <div id="section-orders" class="section active">
    <div class="toolbar">
      <div class="search-wrap">
        <i class="ti ti-search si"></i>
        <input type="text" id="search" placeholder="이름, 연락처, 법인명 검색..." oninput="renderTable()">
      </div>
      <select class="tb-select" id="filter-product" onchange="renderTable()"><option value="">전체 DB 종류</option></select>
      <select class="tb-select" id="filter-company" onchange="renderTable()"><option value="">전체 소속</option></select>
      <select class="tb-select" id="filter-region" onchange="renderTable()"><option value="">전체 지역</option></select>
      <select class="tb-select" id="filter-pay" onchange="renderTable()"><option value="">결제 수단</option><option>현금</option><option>카드</option></select>
      <select class="tb-select" id="filter-tax" onchange="renderTable()">
        <option value="">세금계산서/영수증</option>
        <option value="tax">세금계산서</option>
        <option value="receipt">현금영수증</option>

function isHoliday(d){
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  const key=d.getFullYear()+'-'+mm+'-'+dd;
  return KR_HOLIDAYS.has(key);
}
function isBizDay(d){
  const dow=d.getDay(); // 0=일, 6=토
  return dow!==0 && dow!==6 && !isHoliday(d);
}
// from(string 'YYYY-MM-DD') ~ today 까지 영업일 수 계산 (from 당일 제외, today 포함)
function calcBizDays(fromStr){
  const from=new Date(fromStr);
  from.setHours(0,0,0,0);
  const today=new Date();
  today.setHours(0,0,0,0);
  if(today<=from) return -(calcBizDaysRange(today,from));
  return calcBizDaysRange(from,today);
}
function calcBizDaysRange(start,end){
  let cnt=0;
  const cur=new Date(start);
  cur.setDate(cur.getDate()+1); // start 다음날부터
  while(cur<=end){
    if(isBizDay(cur)) cnt++;
    cur.setDate(cur.getDate()+1);
  }
  return cnt;
}

function load(){
  try{const s=localStorage.getItem(SK);orders=s?JSON.parse(s):JSON.parse(JSON.stringify(SAMPLE));}
  catch(e){orders=JSON.parse(JSON.stringify(SAMPLE));}
  // 기존 데이터에 tax/receipt 없으면 기본값 추가
  orders.forEach(o=>{if(o.tax===undefined)o.tax=false;if(o.receipt===undefined)o.receipt=false;if(o.distDate===undefined)o.distDate='';if(o.month===undefined)o.month=o.date.slice(0,7);});
  try{const p=localStorage.getItem(PK);products=p?JSON.parse(p):JSON.parse(JSON.stringify(SP));}
  catch(e){products=JSON.parse(JSON.stringify(SP));}
}
function save(){
  try{localStorage.setItem(SK,JSON.stringify(orders));localStorage.setItem(PK,JSON.stringify(products));}catch(e){}
}

/* ── MONTH ── */
function getOrderMonth(o){return o.month||o.date.slice(0,7);}
function getAvailableMonths(){
  return [...new Set(orders.map(o=>getOrderMonth(o)).filter(Boolean))].sort();
}
function monthLabel(ym){
  if(!ym)return'전체 기간';
  const [y,m]=ym.split('-');
  return y+'년 '+parseInt(m)+'월';
}
function renderMonthNav(){
  const months=getAvailableMonths();
  const label=document.getElementById('month-current-label');
  const allBtn=document.getElementById('btn-all-months');
  label.textContent=currentMonth?monthLabel(currentMonth):'전체 기간';
  currentMonth?allBtn.classList.remove('active'):allBtn.classList.add('active');
  const recent=months.slice(-6);
  document.getElementById('month-tabs').innerHTML=recent.map(m=>
    `<button class="month-tab${currentMonth===m?' active':''}" onclick="setMonth('${m}')">${monthLabel(m)}</button>`
  ).join('');
}
function setMonth(ym){currentMonth=ym;regionFilter=null;renderMonthNav();populateFilters();renderTable();}
function setAllMonths(){currentMonth=null;regionFilter=null;renderMonthNav();populateFilters();renderTable();}
function changeMonth(dir){
  const months=getAvailableMonths();
  if(!months.length)return;
  if(!currentMonth){setMonth(dir>0?months[0]:months[months.length-1]);return;}
  const idx=months.indexOf(currentMonth);
  const next=months[idx+dir];
  if(next)setMonth(next);
}

/* ── BASE FILTER ── */
function getMonthFiltered(){
  return orders.filter(o=>{
    if(currentMonth&&getOrderMonth(o)!==currentMonth)return false;
    if(regionFilter&&normalizeRegion(o.r1)!==regionFilter)return false;
    return true;
  });
}

/* ── REGION ── */
function normalizeRegion(r1){
  if(!r1)return'기타';
  for(const r of REGIONS){if(r1===r)return r;}
  if(r1.includes('경기')||r1.includes('서울')||r1.includes('인천'))return'수도권';
  if(r1.includes('경북')||r1.includes('대구'))return'경북대구';
  if(r1.includes('부산')||r1.includes('울산')||r1.includes('경남'))return'부산 울산 경남';
  if(r1.includes('강원'))return'강원도';
  if(r1.includes('충청')||r1.includes('충남')||r1.includes('충북')||r1.includes('세종')||r1.includes('대전'))return'충청도';
  if(r1.includes('전라')||r1.includes('광주'))return'전라남도';
  if(r1.includes('제주'))return'제주도';
  return'기타';
}
function renderRegionBoard(){
  const base=orders.filter(o=>!currentMonth||getOrderMonth(o)===currentMonth);
  const byRegion={};REGIONS.forEach(r=>byRegion[r]=0);
  base.forEach(o=>{const r=normalizeRegion(o.r1);byRegion[r]=(byRegion[r]||0)+Number(o.qty);});
  const total=Object.values(byRegion).reduce((a,b)=>a+b,0)||1;
  document.getElementById('region-period-label').textContent=currentMonth?monthLabel(currentMonth):'전체 기간';
  document.getElementById('region-grid').innerHTML=REGIONS.map(r=>{
    const v=byRegion[r]||0;
    return `<div class="region-cell${regionFilter===r?' active-filter':''}" onclick="toggleRegionFilter('${r}')">
      <div class="region-cell-name">${r}</div>
      <div class="region-cell-val">${v}</div>
      <div class="region-cell-sub">${Math.round(v/total*100)}%</div>
    </div>`;
  }).join('');
}
function toggleRegionFilter(r){regionFilter=regionFilter===r?null:r;renderRegionBoard();renderTable();}

/* ── KPI ── */
function renderKPI(){
  const base=getMonthFiltered();
  const total=base.reduce((s,o)=>s+o.price*o.qty,0);
  const totalQty=base.reduce((s,o)=>s+Number(o.qty),0);
  const companies=[...new Set(base.map(o=>o.company))].length;
  const cash=base.filter(o=>o.pay==='현금').reduce((s,o)=>s+o.price*o.qty,0);
  const taxCnt=base.filter(o=>o.tax).length;
  const receiptCnt=base.filter(o=>o.receipt).length;
  document.getElementById('kpi-row').innerHTML=`
    <div class="kpi"><div class="kpi-label">주문 건수</div><div class="kpi-val">${base.length}건</div></div>
    <div class="kpi"><div class="kpi-label">총 수량</div><div class="kpi-val blue">${totalQty.toLocaleString()}건</div></div>
    <div class="kpi"><div class="kpi-label">예상 매출</div><div class="kpi-val">${total.toLocaleString()}원</div></div>
    <div class="kpi"><div class="kpi-label">현금 매출</div><div class="kpi-val white">${(cash/10000).toLocaleString()}만원</div></div>
    <div class="kpi"><div class="kpi-label">거래처 수</div><div class="kpi-val white">${companies}</div></div>
    <div class="kpi"><div class="kpi-label">세금계산서</div><div class="kpi-val yellow">${taxCnt}건</div></div>
    <div class="kpi"><div class="kpi-label">현금영수증</div><div class="kpi-val blue">${receiptCnt}건</div></div>
  `;
}

/* ── FILTER ── */
function getFiltered(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const fp=document.getElementById('filter-product').value;
  const fc=document.getElementById('filter-company').value;
  const fr=document.getElementById('filter-region').value;
  const fpy=document.getElementById('filter-pay').value;
  const ftax=document.getElementById('filter-tax').value;
  return getMonthFiltered().filter(o=>{
    if(q&&!`${o.company}${o.name}${o.product}${o.phone||''}${o.note}`.toLowerCase().includes(q))return false;
    if(fp&&o.product!==fp)return false;
    if(fc&&o.company!==fc)return false;
    if(fr&&o.r1!==fr)return false;
    if(fpy&&o.pay!==fpy)return false;
    if(ftax==='tax'&&!o.tax)return false;
    if(ftax==='receipt'&&!o.receipt)return false;
    if(ftax==='none'&&(o.tax||o.receipt))return false;
    return true;
  });
}
function sortBy(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}
  document.querySelectorAll('[id^="sort-"]').forEach(e=>e.textContent='');
  const el=document.getElementById('sort-'+col);if(el)el.textContent=sortDir===1?' ↑':' ↓';
  renderTable();
}

/* ── TABLE ── */
const GROUP_COLORS=[
  {border:'rgba(0,212,161,0.5)',bg:'rgba(0,212,161,0.04)'},
  {border:'rgba(96,165,250,0.5)',bg:'rgba(96,165,250,0.04)'},
  {border:'rgba(251,191,36,0.5)',bg:'rgba(251,191,36,0.04)'},
  {border:'rgba(167,139,250,0.5)',bg:'rgba(167,139,250,0.04)'},
  {border:'rgba(34,211,238,0.5)',bg:'rgba(34,211,238,0.04)'},
  {border:'rgba(248,113,113,0.5)',bg:'rgba(248,113,113,0.04)'},
  {border:'rgba(52,211,153,0.5)',bg:'rgba(52,211,153,0.04)'},
  {border:'rgba(244,114,182,0.5)',bg:'rgba(244,114,182,0.04)'},
];

function renderTable(){
  const rows=getFiltered();
  rows.sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(sortCol==='price'||sortCol==='qty'){av=+av;bv=+bv;}
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  document.getElementById('row-count').textContent=rows.length+'건';
  const total=rows.reduce((s,o)=>s+o.price*o.qty,0);
  document.getElementById('page-info').textContent='총 '+rows.length+'건'+(regionFilter?' · '+regionFilter+' 필터 중':'');
  document.getElementById('total-amt').textContent='합계 '+total.toLocaleString()+'원';
  const tbody=document.getElementById('table-body');
  if(!rows.length){
    tbody.innerHTML='<tr><td colspan="15" class="empty-state">이 기간에 등록된 주문이 없어요</td></tr>';
    renderKPI();renderRegionBoard();return;
  }

  // 이름 그룹 색상
  const nameCnt={};rows.forEach(o=>{nameCnt[o.name]=(nameCnt[o.name]||0)+1;});
  const nameColor={};let ci=0;
  rows.forEach(o=>{if(nameCnt[o.name]>=2&&!(o.name in nameColor)){nameColor[o.name]=GROUP_COLORS[ci%GROUP_COLORS.length];ci++;}});

  tbody.innerHTML=rows.map((o,rowIdx)=>{
    const oi=orders.indexOf(o);
    const psel=products.map(p=>`<option value="${p.name}"${o.product===p.name?' selected':''}>${p.name}</option>`).join('');
    const gc=nameColor[o.name];
    const isFirst=gc&&(rowIdx===0||rows[rowIdx-1].name!==o.name);
    const isLast=gc&&(rowIdx===rows.length-1||rows[rowIdx+1].name!==o.name);

    const trBorder=gc&&!isLast?'border-bottom:1px solid rgba(255,255,255,0.03)':'border-bottom:1px solid rgba(42,47,69,0.5)';
    const trBg=gc?`background:${gc.bg};`:'';
    const topBorder=gc&&isFirst?`;border-top:1px solid ${gc.border}`:'';
    const botBorder=gc&&isLast?`;border-bottom:1px solid ${gc.border}`:'';
    const leftBorder=gc?`;border-left:3px solid ${gc.border};padding-left:9px`:'';

    // 긴급 경고: 배분일 기준 영업일(주말+한국공휴일 제외) 24일 초과 여부
    let urgencyBadge='<span class="no-dist">-</span>';
    let isUrgent=false;
    if(o.distDate){
      const bizDays=calcBizDays(o.distDate);
      if(bizDays>=24){
        isUrgent=true;
        urgencyBadge=`<span class="urgent-badge"><i class="ti ti-alert-triangle" style="font-size:11px"></i> 긴급 (영업일 ${bizDays}일)</span>`;
      } else if(bizDays>=18){
        urgencyBadge=`<span class="warn-badge"><i class="ti ti-clock" style="font-size:11px"></i> 주의 (영업일 ${bizDays}일)</span>`;
      } else if(bizDays>=0){
        urgencyBadge=`<span class="ok-badge"><i class="ti ti-check" style="font-size:11px"></i> 정상 (영업일 ${bizDays}일)</span>`;
      } else {
        urgencyBadge=`<span class="ok-badge" style="color:var(--accent2);border-color:rgba(0,184,230,0.3)"><i class="ti ti-calendar" style="font-size:11px"></i> D-${Math.abs(bizDays)}</span>`;
      }
    }

    const nameCell=isFirst
      ?`<td style="font-weight:600${topBorder}${leftBorder}">${o.name}<span style="margin-left:6px;font-size:10px;padding:1px 7px;border-radius:20px;background:${gc.border};color:#0f1117;font-weight:700">${nameCnt[o.name]}건</span></td>`
      :gc
        ?`<td style="color:transparent;font-size:9px${leftBorder}">·</td>`
        :`<td style="font-weight:600">${o.name}</td>`;

    // 세금계산서/현금영수증 셀
    const taxCell=`<td>
      <button class="tax-toggle${o.tax?' on-tax':''}" onclick="toggleTax(${oi},'tax')" title="세금계산서">
        <i class="ti ti-file-invoice"></i> 세금계산서
      </button>
      <button class="tax-toggle${o.receipt?' on-receipt':''}" onclick="toggleTax(${oi},'receipt')" style="margin-left:4px" title="현금영수증">
        <i class="ti ti-receipt"></i> 영수증
      </button>
    </td>`;

    return `<tr class="${isUrgent?'row-urgent':''}" style="${trBg}${trBorder}${botBorder}">
      <td style="color:var(--muted)${topBorder}">${o.date}</td>
      <td style="color:var(--muted)${topBorder}">${o.distDate||'<span style=\"color:#3a4060\">미설정</span>'}<br>${urgencyBadge}</td>
      <td style="max-width:115px;overflow:hidden;text-overflow:ellipsis${topBorder}" title="${o.company}">${o.company}</td>
      ${nameCell}
      <td><select class="inline-sel" onchange="inlineChange(${oi},'product',this.value)">${psel}</select></td>
      <td style="color:var(--muted)">${Number(o.price).toLocaleString()}원</td>
      <td style="text-align:center;font-weight:700;color:var(--accent)">${o.qty}</td>
      <td>${o.r1||''}</td>
      <td style="color:var(--muted)">${o.r2||''}</td>
      <td><select class="inline-sel" style="width:106px" onchange="inlineChange(${oi},'confirm',this.value)">
        <option${o.confirm==='결제 완료'?' selected':''}>결제 완료</option>
        <option${o.confirm==='결제 대기'?' selected':''}>결제 대기</option>
        <option${o.confirm==='취소'?' selected':''}>취소</option>
      </select></td>
      <td><select class="inline-sel" onchange="inlineChange(${oi},'pay',this.value)">
        <option${o.pay==='현금'?' selected':''}>현금</option>
        <option${o.pay==='카드'?' selected':''}>카드</option>
      </select></td>
      ${taxCell}
      <td style="color:var(--muted);font-size:11px;max-width:100px;overflow:hidden;text-overflow:ellipsis" title="${o.note||''}">${o.note||''}</td>
      <td>
        <button class="btn" style="height:28px;padding:0 8px;font-size:11px" onclick="editOrder(${oi})"><i class="ti ti-edit"></i></button>
        <button class="btn danger" style="height:28px;padding:0 8px;font-size:11px;margin-left:3px" onclick="deleteOrder(${oi})"><i class="ti ti-trash"></i></button>
      </td>
    </tr>`;
  }).join('');
  renderKPI();renderRegionBoard();renderMonthNav();
}

function toggleTax(oi, field){
  orders[oi][field]=!orders[oi][field];
  save();renderTable();
}
function inlineChange(oi,field,val){orders[oi][field]=val;save();renderKPI();renderRegionBoard();}

/* ── POPULATE FILTERS ── */
function populateFilters(){
  const base=getMonthFiltered();
  const fp=document.getElementById('filter-product');
  const fc=document.getElementById('filter-company');
  const freg=document.getElementById('filter-region');
  if(fp){const cv=fp.value;fp.innerHTML='<option value="">전체 DB 종류</option>'+[...new Set(base.map(o=>o.product))].sort().map(v=>`<option${cv===v?' selected':''}>${v}</option>`).join('');}
  if(fc){const cv=fc.value;fc.innerHTML='<option value="">전체 소속</option>'+[...new Set(base.map(o=>o.company))].sort().map(v=>`<option${cv===v?' selected':''}>${v}</option>`).join('');}
  if(freg){const cv=freg.value;freg.innerHTML='<option value="">전체 지역</option>'+[...new Set(base.map(o=>o.r1).filter(Boolean))].sort().map(v=>`<option${cv===v?' selected':''}>${v}</option>`).join('');}
  const fpr=document.getElementById('f-product');
  if(fpr)fpr.innerHTML=products.map(p=>`<option value="${p.name}">${p.name} (${Number(p.price).toLocaleString()}원)</option>`).join('');
}

/* ── SECTION ── */
function showSection(s,btn){
  document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'));

/* ── MODAL ── */
function openModal(idx=null){
  editIdx=idx;populateFilters();
  document.getElementById('modal-title').textContent=idx!==null?'주문 수정':'신규 주문 등록';
  if(idx!==null){
    const o=orders[idx];
    ['date','distDate','company','name','phone','price','qty','note'].forEach(k=>{const el=document.getElementById('f-'+k);if(el)el.value=o[k]||'';});
    document.getElementById('f-product').value=o.product;
    populateMonthSelect(o.month||getOrderMonth(o));
    document.getElementById('f-region1').value=o.r1||'';
    document.getElementById('f-region2').value=o.r2||'';
    document.getElementById('f-confirm').value=o.confirm;
    document.getElementById('f-pay').value=o.pay;
    document.getElementById('f-tax').checked=!!o.tax;
    document.getElementById('f-receipt').checked=!!o.receipt;
  } else {
    document.getElementById('f-date').value=currentMonth?currentMonth+'-01':new Date().toISOString().split('T')[0];
    ['company','name','phone','price','qty','region2','note'].forEach(k=>{const el=document.getElementById('f-'+k);if(el)el.value='';});
    document.getElementById('f-region1').value='';
    populateMonthSelect(currentMonth||new Date().toISOString().slice(0,7));
    document.getElementById('f-confirm').value='결제 완료';
    document.getElementById('f-pay').value='현금';
    document.getElementById('f-tax').checked=false;
    document.getElementById('f-receipt').checked=false;
    setPrice();
  }
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');editIdx=null;}
function bgClick(e){if(e.target===document.getElementById('modal-bg'))closeModal();}
function setPrice(){
  const sel=document.getElementById('f-product'),pr=document.getElementById('f-price');
  if(!sel||!pr)return;
  const f=products.find(p=>p.name===sel.value);if(f)pr.value=f.price;
}
function saveOrder(){
  const o={
    id:editIdx!==null?orders[editIdx].id:Date.now(),
    date:document.getElementById('f-date').value,
    month:document.getElementById('f-month').value||currentMonth||document.getElementById('f-date').value.slice(0,7),
    distDate:document.getElementById('f-distDate').value,
    company:document.getElementById('f-company').value.trim(),
    name:document.getElementById('f-name').value.trim(),
    phone:document.getElementById('f-phone').value.trim(),
    product:document.getElementById('f-product').value,
    price:Number(document.getElementById('f-price').value)||0,
    qty:Number(document.getElementById('f-qty').value)||0,
    r1:document.getElementById('f-region1').value,
    r2:document.getElementById('f-region2').value.trim(),
    confirm:document.getElementById('f-confirm').value,
    pay:document.getElementById('f-pay').value,
    tax:document.getElementById('f-tax').checked,
    receipt:document.getElementById('f-receipt').checked,
    note:document.getElementById('f-note').value.trim()
  };
  if(!o.date||!o.company||!o.name){alert('날짜, 소속, 이름은 필수입니다.');return;}
  if(editIdx!==null)orders[editIdx]=o;else orders.push(o);
  save();closeModal();populateFilters();renderTable();
}
function editOrder(idx){openModal(idx);}
function deleteOrder(idx){if(confirm('이 주문을 삭제할까요?')){orders.splice(idx,1);save();populateFilters();renderTable();}}

/* ── CSV ── */
function exportCSV(){
  const rows=getFiltered();
  const h=['주문날짜','배분일자','소속','이름','연락처','DB종류','단가','수량','합계','1차지역','2차지역','결제확인','현금카드','세금계산서','현금영수증','메모'];
  const lines=[h.join(','),...rows.map(o=>[
    o.date,o.distDate||'',o.company,o.name,o.phone||'',o.product,o.price,o.qty,o.price*o.qty,
    o.r1,o.r2||'',o.confirm,o.pay,o.tax?'발행':'',o.receipt?'발행':'',o.note||''
  ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','))];
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='JD_주문내역'+(currentMonth?'_'+currentMonth:'_전체')+'.csv';
  a.click();
}

/* ── STATS ── */
function renderStats(){
  const months=getAvailableMonths();
  const byMonth={};
  months.forEach(m=>byMonth[m]={cnt:0,qty:0,amt:0,cash:0,tax:0,receipt:0});
  orders.forEach(o=>{
    const m=getOrderMonth(o);if(!m||!byMonth[m])return;
    byMonth[m].cnt++;byMonth[m].qty+=Number(o.qty);byMonth[m].amt+=o.price*o.qty;
    if(o.pay==='현금')byMonth[m].cash+=o.price*o.qty;
    if(o.tax)byMonth[m].tax++;if(o.receipt)byMonth[m].receipt++;
  });
  const t={cnt:0,qty:0,amt:0,cash:0,tax:0,receipt:0};
  months.forEach(m=>{t.cnt+=byMonth[m].cnt;t.qty+=byMonth[m].qty;t.amt+=byMonth[m].amt;t.cash+=byMonth[m].cash;t.tax+=byMonth[m].tax;t.receipt+=byMonth[m].receipt;});

  document.getElementById('monthly-table').innerHTML=`
    <thead><tr>
      <th>월</th><th>주문건수</th><th>총수량</th><th>매출합계</th><th>현금매출</th><th>카드매출</th><th>세금계산서</th><th>현금영수증</th>
    </tr></thead>
    <tbody>
      ${months.map(m=>`<tr style="${currentMonth===m?'background:rgba(0,212,161,0.06)':''}">
        <td style="cursor:pointer;color:${currentMonth===m?'var(--accent)':'var(--text)'}" onclick="setMonth('${m}')">${monthLabel(m)}</td>
        <td>${byMonth[m].cnt}건</td>
        <td style="color:var(--accent2)">${byMonth[m].qty}건</td>
        <td class="ms-total">${byMonth[m].amt.toLocaleString()}원</td>
        <td>${(byMonth[m].cash/10000).toLocaleString()}만원</td>
        <td>${((byMonth[m].amt-byMonth[m].cash)/10000).toLocaleString()}만원</td>
        <td style="color:var(--yellow)">${byMonth[m].tax}건</td>
        <td style="color:var(--blue)">${byMonth[m].receipt}건</td>
      </tr>`).join('')}
      <tr style="border-top:1px solid var(--border)">
        <td style="font-weight:700;color:var(--text)">합 계</td>
        <td style="font-weight:700">${t.cnt}건</td>
        <td style="font-weight:700;color:var(--accent2)">${t.qty}건</td>
        <td class="ms-total" style="font-size:13px">${t.amt.toLocaleString()}원</td>
        <td style="font-weight:700">${(t.cash/10000).toLocaleString()}만원</td>
        <td style="font-weight:700">${((t.amt-t.cash)/10000).toLocaleString()}만원</td>
        <td style="font-weight:700;color:var(--yellow)">${t.tax}건</td>
        <td style="font-weight:700;color:var(--blue)">${t.receipt}건</td>
      </tr>
    </tbody>`;

  const base=getMonthFiltered();
  document.getElementById('stat-period-label').textContent='('+(currentMonth?monthLabel(currentMonth):'전체')+')';
  const byProduct={},byCompany={},byRegion={},byPerson={};
  base.forEach(o=>{
    byProduct[o.product]=(byProduct[o.product]||0)+Number(o.qty);
    byCompany[o.company]=(byCompany[o.company]||0)+o.price*o.qty;
    byRegion[o.r1||'미분류']=(byRegion[o.r1||'미분류']||0)+Number(o.qty);
    byPerson[o.name]=(byPerson[o.name]||0)+o.price*o.qty;
  });
  function rs(el,data,fmt){
    const sorted=Object.entries(data).sort((a,b)=>b[1]-a[1]);
    el.innerHTML=sorted.map(([k,v])=>`<div class="stat-row-item"><span>${k}</span><span class="sv">${fmt(v)}</span></div>`).join('')
      ||'<div class="stat-row-item"><span style="color:var(--muted)">데이터 없음</span></div>';
  }
  rs(document.getElementById('stat-product'),byProduct,v=>v+'건');
  rs(document.getElementById('stat-company'),byCompany,v=>(v/10000).toLocaleString()+'만원');
  rs(document.getElementById('stat-region'),byRegion,v=>v+'건');
  rs(document.getElementById('stat-person'),byPerson,v=>(v/10000).toLocaleString()+'만원');
}

/* ── 월 선택 드롭다운 (모달용) ── */
function populateMonthSelect(selected){
  const sel=document.getElementById('f-month');
  if(!sel)return;
  const months=getAvailableMonths();
  // 현재 달 없으면 추가
  const now=new Date();
  const thisMonth=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const allMonths=[...new Set([...months, thisMonth])].sort();
  sel.innerHTML=allMonths.map(m=>`<option value="${m}"${selected===m?' selected':''}>${monthLabel(m)}</option>`).join('');
  // 새 달 추가 옵션
  sel.innerHTML+=`<option value="__new__">+ 새 달 직접 입력...</option>`;
  sel.onchange=function(){
    if(this.value==='__new__'){
      const v=prompt('귀속 월을 입력하세요 (예: 2026-08)');
      if(v&&/^\d{4}-\d{2}$/.test(v)){
        const opt=document.createElement('option');
        opt.value=v; opt.textContent=monthLabel(v); opt.selected=true;
        sel.insertBefore(opt, sel.lastElementChild);
        sel.value=v;
      } else {
        sel.value=selected||allMonths[allMonths.length-1]||thisMonth;
      }
    }
  };
}
/* ── INIT ── */
function init(){
  load();
  const now=new Date();
  const todayYM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const months=getAvailableMonths();
  currentMonth=months.includes(todayYM)?todayYM:(months.length?months[months.length-1]:null);
  renderMonthNav();populateFilters();renderTable();
  document.getElementById('sort-name').textContent=' ↑';
}

// 이미 로그인된 경우 바로 init
if(sessionStorage.getItem('jd_auth')==='1') init();
else document.getElementById('lock-input').focus();
</script>
